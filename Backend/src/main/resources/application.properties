
spring.application.name=ipl-auction-backend

server.port=8086

# Local MySQL default: 3306. Docker Compose maps host 3307 -> set SPRING_DATASOURCE_URL accordingly.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ipl_auction?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:9949}

# Set to `none` only if you want the JVM to start without MySQL (room create will still fail).
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.datasource.hikari.connection-timeout=10000
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Allow app to boot even if DB isn't up yet (useful during frontend/dev work).
spring.datasource.hikari.initialization-fail-timeout=0
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# React dev server
app.cors.allowed-origin=http://localhost:5173
